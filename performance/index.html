<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Performance Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #0f172a;
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 30px;
    }

    .box {
      max-width: 750px;
      background: rgba(255,255,255,0.08);
      padding: 35px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.15);
    }

    h1 {
      font-size: 36px;
      margin-bottom: 15px;
    }

    p {
      color: #cbd5e1;
      font-size: 18px;
      line-height: 1.6;
    }

    a {
      display: inline-block;
      margin-top: 25px;
      padding: 12px 18px;
      background: #38bdf8;
      color: #0f172a;
      text-decoration: none;
      border-radius: 10px;
      font-weight: bold;
    }

    a:hover {
      background: #7dd3fc;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>📊 Performance Dashboard</h1>
    <p>
      This section will track scanner performance, including top trade picks,
      10-day outcomes, win rate, average return, highest gainers, failed setups,
      and historical trade performance.
    </p>
    <a href="../">Back to Dashboard</a>
  </div>
</body>
</html>
