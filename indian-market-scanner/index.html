<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Indian Market Scanner</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #0f172a;
      color: white;
      min-height: 100vh;
      padding: 30px;
    }

    .topbar {
      max-width: 1150px;
      margin: 0 auto 24px auto;
      text-align: left;
    }

    .back-link {
      display: inline-block;
      color: #38bdf8;
      text-decoration: none;
      font-weight: bold;
      font-size: 15px;
      padding: 10px 0;
    }

    .back-link:hover {
      color: #7dd3fc;
    }

    .page-wrap {
      min-height: calc(100vh - 90px);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .box {
      max-width: 700px;
      background: rgba(255,255,255,0.08);
      padding: 35px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.15);
    }

    h1 {
      font-size: 36px;
      margin-bottom: 15px;
    }

    p {
      color: #cbd5e1;
      font-size: 18px;
      line-height: 1.6;
    }

    .button {
      display: inline-block;
      margin-top: 25px;
      padding: 12px 18px;
      background: #38bdf8;
      color: #0f172a;
      text-decoration: none;
      border-radius: 10px;
      font-weight: bold;
    }

    .button:hover {
      background: #7dd3fc;
    }
  </style>
</head>

<body>
  <div class="topbar">
    <a class="back-link" href="https://pankajmanchnda.github.io/trading-agents/">
      ← Back to Trading Agents Dashboard
    </a>
  </div>

  <main class="page-wrap">
    <div class="box">
      <h1>🇮🇳 Indian Market Scanner</h1>

      <p>
        This section will contain the Indian equity swing-trading scanner,
        ranked trade candidates, scores, priorities, volume strength,
        expected upside, and risk metrics.
      </p>

      <a class="button" href="https://pankajmanchnda.github.io/trading-agents/">
        Back to Dashboard
      </a>
    </div>
  </main>
</body>
</html>
